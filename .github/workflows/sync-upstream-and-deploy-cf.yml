name: Sync upstream and deploy Cloudflare

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-and-deploy-cf
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/JoeanAmier/XHS-Downloader.git
          git fetch upstream master
          before="$(git rev-parse HEAD)"
          git merge --no-edit upstream/master
          after="$(git rev-parse HEAD)"
          if [ "$before" != "$after" ]; then
            git push origin HEAD:master
          fi

      - name: Check Cloudflare token
        id: cf-token
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set up Node.js
        if: steps.cf-token.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deploy dependencies
        if: steps.cf-token.outputs.available == 'true'
        run: npm ci

      - name: Deploy to Cloudflare
        if: steps.cf-token.outputs.available == 'true'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Skip Cloudflare deploy
        if: steps.cf-token.outputs.available == 'false'
        run: |
          echo "CLOUDFLARE_API_TOKEN is not configured. Upstream sync is enabled, but Cloudflare deploy was skipped."
